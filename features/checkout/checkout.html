<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - FreshMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../../assets/header.css" />
    <link rel="stylesheet" href="checkout.css" />
  </head>
  <body>
    <header id="navbar-container"></header>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay"></div>

    <div id="cart-slider" class="slider">
      <div class="cart-header">
        <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
        <button class="close-icon" id="close-icon" aria-label="Close cart">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="slider-content" id="cart-list">
        <div class="cart-empty" id="cart-empty">
          <i class="fas fa-shopping-bag"></i>
          <p>Your cart is empty</p>
          <span>Add some products to get started!</span>
        </div>
      </div>
      <footer class="cart-footer">
        <div class="total" id="total-price"></div>
        <button class="checkout-button" id="checkout-button">
          <i class="fas fa-lock"></i> Secure Checkout
        </button>
      </footer>
    </div>

    <!-- Breadcrumb -->
    <nav class="checkout-breadcrumb">
      <a href="../../index.html"><i class="fas fa-home"></i> Home</a>
      <span><i class="fas fa-chevron-right"></i></span>
      <span class="current">Checkout</span>
    </nav>

    <!-- Page Header -->
    <div class="checkout-page-header">
      <h1><i class="fas fa-credit-card"></i> Checkout</h1>
      <p>Complete your order by filling in the details below</p>
    </div>

    <!-- Checkout Content -->
    <div class="checkout-container">
      <section class="customer-information">
        <div class="section-card">
          <div class="card-title">
            <i class="fas fa-user-circle"></i>
            <h3>Customer Information</h3>
          </div>
          <form>
            <div class="form-row">
              <div class="form-group">
                <label for="firstname"><i class="fas fa-user"></i> First Name</label>
                <input
                  type="text"
                  name="firstname"
                  placeholder="John"
                  required
                  id="firstname"
                />
              </div>
              <div class="form-group">
                <label for="lastname"><i class="fas fa-user"></i> Last Name</label>
                <input
                  type="text"
                  name="lastname"
                  placeholder="Doe"
                  required
                  id="lastname"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
              <input
                type="email"
                name="email"
                placeholder="john@example.com"
                required
                id="email"
              />
            </div>

            <div class="form-group">
              <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
              <input
                type="tel"
                name="phone"
                placeholder="+880 1XXX-XXXXXX"
                required
                id="phone"
              />
            </div>

            <div class="form-group">
              <label for="address"><i class="fas fa-map-marker-alt"></i> Shipping Address</label>
              <textarea
                name="address"
                placeholder="Enter your full delivery address"
                required
                id="address"
                rows="3"
              ></textarea>
            </div>

            <button
              class="place-order-btn"
              id="checkout-place-order-button"
              type="submit"
            >
              <i class="fas fa-check-circle"></i> Place Order
            </button>
          </form>
        </div>
      </section>

      <section class="order-summary">
        <div class="section-card">
          <div class="card-title">
            <i class="fas fa-receipt"></i>
            <h3>Order Summary</h3>
          </div>
          <section id="cart-list-summary" class="summary-items"></section>
          <div class="summary-total" id="summary-total"></div>
        </div>
      </section>
    </div>

    <!-- Modal -->
    <div id="myModal" class="modal">
      <div class="modal-inner">
        <div class="modal-header">
          <div class="modal-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2>Order Confirmed!</h2>
          <p>Your order has been placed successfully</p>
        </div>
        <div class="modal-body">
          <div class="modal__customer-info" id="modal-customer-info"></div>
        </div>
        <button class="modal-close-btn close">
          <i class="fas fa-home"></i> Continue Shopping
        </button>
      </div>
    </div>
    <div id="overlay" class="overlay"></div>

    <script src="checkout.js" type="module"></script>
  </body>
</html>
